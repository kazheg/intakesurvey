<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cognitive &amp; Perceptual Studies — Intake Survey</title>
<link rel="icon" id="favicon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%23f2f1ec'/%3E%3Crect x='2' y='2' width='12' height='12' fill='%233a3a38'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f2f1ec;
    --paper: #ebe9e2;
    --ink: #3a3a38;
    --ink-soft: #6b6b66;
    --form-blue: #4a5568;
    --sick-green: #3d4a3a;
    --rust: #5c2f28;
    --accent-live: #4a5568;
    --border-live: #c9c6bb;
    --dread: 0;
    --scanline-opacity: 0.06;
    --serif: 'PT Serif', Georgia, 'Times New Roman', serif;
    --mono: 'IBM Plex Mono', 'Courier New', monospace;
    --current-font: var(--serif);
  }

  /* Customization Themes */
  [data-theme="crimson"] {
    --bg: #1c0a0a;
    --paper: #2a1111;
    --ink: #e8d0d0;
    --ink-soft: #9c6c6c;
    --border-live: #5e2626;
    --accent-live: #b33939;
  }
  
  [data-theme="void"] {
    --bg: #050505;
    --paper: #0f0f0f;
    --ink: #d4d4d4;
    --ink-soft: #5e5e5e;
    --border-live: #2b2b2b;
    --accent-live: #757575;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--current-font);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    transition: background-color 1s ease, color 1s ease;
  }

  body {
    filter: saturate(calc(1 - (var(--dread) * 0.025)));
    transition: filter 3s ease;
    overflow-x: hidden;
  }

  #app {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 48px 20px 96px;
    z-index: 10;
  }

  a { color: inherit; }

  /* ---------- Background Graphic (Eye) ---------- */
  #watcher-container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80vw;
    max-width: 600px;
    opacity: calc(var(--dread) * 0.04);
    pointer-events: none;
    z-index: 1;
    transition: opacity 2s ease;
    mix-blend-mode: multiply;
  }
  [data-theme="void"] #watcher-container { mix-blend-mode: screen; opacity: calc(var(--dread) * 0.08); }
  [data-theme="crimson"] #watcher-container { mix-blend-mode: screen; opacity: calc(var(--dread) * 0.06); }

  #watcher-svg {
    width: 100%;
    height: 100%;
    stroke: var(--ink-soft);
    fill: none;
    stroke-width: 0.5;
  }
  #watcher-pupil {
    fill: var(--ink);
    transition: cx 0.1s ease, cy 0.1s ease;
  }

  /* ---------- Header / masthead ---------- */
  .masthead {
    width: 100%;
    max-width: 620px;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--border-live);
    padding-bottom: 14px;
    transition: border-color 2s ease;
  }
  .masthead .dept {
    font-family: var(--current-font);
    font-size: 13px;
    letter-spacing: 0.04em;
    color: var(--ink-soft);
    text-transform: uppercase;
  }
  .masthead .title {
    font-family: var(--current-font);
    font-size: 22px;
    font-weight: 700;
    margin-top: 4px;
  }
  .masthead .protocol {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 6px;
  }

  /* ---------- Progress bar ---------- */
  .progress-wrap {
    width: 100%;
    max-width: 620px;
    margin-bottom: 34px;
  }
  .progress-track {
    width: 100%;
    height: 6px;
    background: rgba(128,128,128,0.2);
    border-radius: 3px;
    overflow: visible;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent-live);
    border-radius: 3px;
    width: 0%;
    transition: width 0.6s cubic-bezier(.4,0,.2,1), background 1.5s ease;
  }
  .progress-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 6px;
    display: flex;
    justify-content: space-between;
  }

  /* ---------- Card / question ---------- */
  .card {
    width: 100%;
    max-width: 620px;
    background: var(--paper);
    border: 1px solid var(--border-live);
    border-radius: 3px;
    padding: 36px 34px;
    transition: opacity 0.55s ease, transform 0.55s ease, border-color 2s ease, background-color 1s ease;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  }
  .card.entering { opacity: 0; transform: translateY(8px); }
  .card.visible { opacity: 1; transform: translateY(0); }
  .card.leaving { opacity: 0; transform: translateY(-6px); }

  .section-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .prompt {
    font-family: var(--current-font);
    font-size: 19px;
    line-height: 1.5;
    margin-bottom: 22px;
    position: relative;
  }

  /* chromatic aberration flicker */
  .prompt.glitching { color: var(--ink); }
  .prompt.glitching::before,
  .prompt.glitching::after {
    content: attr(data-text);
    position: absolute;
    left: 0; top: 0;
    width: 100%;
    opacity: 0.55;
    pointer-events: none;
  }
  .prompt.glitching::before {
    color: #c0453e;
    transform: translate(2.5px, -1px);
    clip-path: inset(0 0 55% 0);
  }
  .prompt.glitching::after {
    color: #3e8fc0;
    transform: translate(-2.5px, 1px);
    clip-path: inset(45% 0 0 0);
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 22px;
  }
  .option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border: 1px solid var(--border-live);
    border-radius: 3px;
    cursor: pointer;
    font-size: 15.5px;
    background: rgba(255,255,255,0.05);
    transition: border-color 0.3s ease, background 0.3s ease;
  }
  .option:hover { border-color: var(--accent-live); background: rgba(128,128,128,0.1); }
  .option.selected {
    border-color: var(--accent-live);
    background: rgba(128,128,128,0.15);
  }
  .option .dot {
    width: 15px; height: 15px;
    border-radius: 50%;
    border: 1.5px solid var(--ink-soft);
    flex-shrink: 0;
    position: relative;
  }
  .option.selected .dot::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent-live);
  }

  .readback {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-soft);
    margin: -8px 0 18px;
    min-height: 16px;
  }

  .error-msg {
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--accent-live);
    margin: -10px 0 16px;
    min-height: 16px;
  }

  .btn-row {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 14px;
    min-height: 40px;
  }
  .btn {
    font-family: var(--current-font);
    font-size: 14.5px;
    padding: 10px 22px;
    background: var(--ink);
    color: var(--bg);
    border: 1px solid var(--ink);
    border-radius: 2px;
    cursor: pointer;
    transition: background 0.3s ease, opacity 0.3s ease, transform 0.1s ease;
  }
  .btn:disabled {
    opacity: 0.35;
    cursor: default;
  }
  .btn:not(:disabled):hover { 
    background: transparent; 
    color: var(--ink);
  }

  .spinner-inline {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-soft);
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .spinner-inline.active { opacity: 1; }
  .spinner-dots span {
    display: inline-block;
    animation: dotpulse 1.2s infinite ease-in-out;
  }
  .spinner-dots span:nth-child(2) { animation-delay: 0.15s; }
  .spinner-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes dotpulse {
    0%, 80%, 100% { opacity: 0.25; }
    40% { opacity: 1; }
  }

  .footer-disclaimer {
    position: fixed;
    left: 14px;
    bottom: 10px;
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-soft);
    opacity: 0.55;
    max-width: 320px;
    z-index: 50;
    pointer-events: none;
  }

  /* ---------- Researcher note popup ---------- */
  .researcher-note {
    position: fixed;
    font-family: var(--mono);
    font-size: 12px;
    background: #1f1f1d;
    color: #c9c6bb;
    border: 1px solid #444;
    padding: 10px 13px;
    max-width: 260px;
    z-index: 200;
    line-height: 1.4;
    box-shadow: 0 4px 18px rgba(0,0,0,0.3);
  }
  .researcher-note.top-right { top: 18px; right: 18px; }
  .researcher-note.bottom-left { bottom: 18px; left: 18px; }

  /* ---------- CRT scanline overlay ---------- */
  .scanlines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0.4) 0px,
      rgba(0,0,0,0.4) 1px,
      transparent 1px,
      transparent 3px
    );
    opacity: var(--scanline-opacity);
    transition: opacity 1s ease;
  }
  .scanlines.glitch { opacity: 0.15; }

  /* ---------- Consent screen ---------- */
  .consent-card {
    max-width: 560px;
    width: 100%;
    background: var(--paper);
    border: 1px solid var(--border-live);
    border-radius: 3px;
    padding: 40px 36px;
    z-index: 10;
  }
  .consent-card h1 {
    font-family: var(--current-font);
    font-size: 21px;
    margin: 0 0 6px;
  }
  .consent-card .protocol-line {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-soft);
    margin-bottom: 22px;
  }
  .consent-card p {
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .content-note-box {
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
    background: rgba(0,0,0,0.04);
    border: 1px solid var(--border-live);
    padding: 14px 16px;
    margin-bottom: 22px;
    color: var(--ink-soft);
  }
  
  /* ---------- Endings ---------- */
  .ending-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 300;
    text-align: center;
    padding: 20px;
  }
  .ending-text {
    font-family: var(--current-font);
    font-size: 21px;
    max-width: 520px;
    line-height: 1.6;
    color: var(--ink);
  }
  .fade-to-black {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 400;
    opacity: 0;
    transition: opacity 3.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .fade-to-black.active { opacity: 1; }
  .closed-text {
    font-family: var(--mono);
    font-size: 13px;
    color: #4a4a48;
    opacity: 0;
    transition: opacity 2s ease 1s;
  }
  .closed-text.show { opacity: 1; }

  /* ---------- Toggles & Settings ---------- */
  .controls-container {
    position: fixed;
    bottom: 14px;
    right: 14px;
    display: flex;
    gap: 8px;
    z-index: 60;
  }
  .floating-btn {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-soft);
    background: var(--paper);
    border: 1px solid var(--border-live);
    border-radius: 20px;
    padding: 6px 12px;
    cursor: pointer;
    user-select: none;
    transition: all 0.2s;
  }
  .floating-btn:hover { background: var(--border-live); color: var(--bg); }

  /* Settings Modal */
  .settings-modal {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 320px;
    background: var(--paper);
    border: 1px solid var(--border-live);
    padding: 24px;
    z-index: 200;
    display: none;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  }
  .settings-modal.active { display: block; }
  .settings-modal h2 { font-family: var(--mono); font-size: 14px; margin: 0 0 16px; border-bottom: 1px solid var(--border-live); padding-bottom: 8px;}
  .settings-row { margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
  .settings-row select { font-family: var(--mono); background: var(--bg); color: var(--ink); border: 1px solid var(--border-live); padding: 4px; }
  .settings-close { display: block; width: 100%; margin-top: 20px; text-align: center; }

  @media (max-width: 640px) {
    .card, .consent-card { padding: 26px 22px; }
    .prompt { font-size: 17px; }
    .masthead .title { font-size: 19px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .card { transition: opacity 0.3s ease; }
    #watcher-container { display: none; }
  }
</style>
</head>
<body>
<!-- Ambient Horror Graphic -->
<div id="watcher-container">
  <svg id="watcher-svg" viewBox="0 0 100 100">
    <path d="M 10 50 Q 50 10 90 50 Q 50 90 10 50" stroke-width="0.5"/>
    <circle id="watcher-pupil" cx="50" cy="50" r="8" />
  </svg>
</div>

<div class="scanlines" id="scanlines"></div>
<div id="app"></div>
<div class="footer-disclaimer">This is a fictional interactive horror story. No data is collected, transmitted, or stored. Contains themes of memory loss, identity, and psychological unease.</div>

<div class="controls-container">
  <div class="floating-btn" id="soundToggle">sound: off</div>
  <div class="floating-btn" id="settingsBtn">⚙️ settings</div>
</div>

<!-- Settings Modal -->
<div class="settings-modal" id="settingsModal">
  <h2>Configuration</h2>
  <div class="settings-row">
    <span>Visual Theme</span>
    <select id="themeSelect">
      <option value="default">Clinical (Default)</option>
      <option value="crimson">Crimson</option>
      <option value="void">The Void</option>
    </select>
  </div>
  <div class="settings-row">
    <span>Typography</span>
    <select id="fontSelect">
      <option value="serif">Serif (Formal)</option>
      <option value="mono">Monospace (Terminal)</option>
    </select>
  </div>
  <div class="settings-row">
    <span>CRT Scanlines</span>
    <select id="scanlineSelect">
      <option value="0">Off</option>
      <option value="0.06" selected>Light</option>
      <option value="0.15">Heavy</option>
    </select>
  </div>
  <div class="settings-row">
    <span>Reduced Motion</span>
    <input type="checkbox" id="globalMotionToggle">
  </div>
  <button class="btn settings-close" id="closeSettingsBtn">Close</button>
</div>

<script>
(function() {
  "use strict";

  /* =========================================================
     STATE
  ========================================================= */
  const state = {
    screen: 'consent',       // consent | survey | ending
    qIndex: 0,
    answers: {},             // id -> value
    name: 'Subject',         // Default identifier, overwritten by Q1
    dread: 0,
    reducedMotion: window.matchMedia('(prefers-reduced-motion: reduce)').matches,
    soundOn: false
  };

  /* =========================================================
     QUESTION DATA (All Multiple Choice Now)
  ========================================================= */
  const QUESTIONS = [
    // ---------------- Section 1 ----------------
    { id: 'q1', section: 1, sectionTitle: 'Intake', type: 'single',
      prompt: 'Please select your designated identifier for record-keeping purposes.',
      options: ['Subject A-90', 'Guest', 'I was not given one', 'The name on the door'] },
    { id: 'q2', section: 1, sectionTitle: 'Intake', type: 'single',
      prompt: 'What is your age range?',
      options: ['Under 18', '18–29', '30–44', '45–59', '60 or older'] },
    { id: 'q3', section: 1, sectionTitle: 'Intake', type: 'single',
      prompt: 'On an average night, how many hours do you sleep?',
      options: ['Fewer than 5', '5–6', '7–8', 'More than 8'],
      flags: { falseValidation: true } },
    { id: 'q4', section: 1, sectionTitle: 'Intake', type: 'single',
      prompt: 'How would you describe your mood today?',
      options: ['Calm', 'Anxious', 'Tired', 'Content', 'Irritable'] },
    { id: 'q5', section: 1, sectionTitle: 'Intake', type: 'single',
      prompt: 'Do you consider yourself a morning person or an evening person?',
      options: ['Morning', 'Evening', 'Neither'] },

    // ---------------- Section 2 ----------------
    { id: 'q6', section: 2, sectionTitle: 'Preferences', type: 'single',
      prompt: 'What temperature do you prefer your room to be while you sleep?',
      options: ['Cool', 'Neutral', 'Warm', "I don't know"] },
    { id: 'q7', section: 2, sectionTitle: 'Preferences', type: 'single',
      prompt: 'Do you talk to yourself when you believe you are alone?',
      options: ['Never', 'Rarely', 'Sometimes', 'Often'] },
    { id: 'q8', section: 2, sectionTitle: 'Preferences', type: 'single',
      prompt: 'Have you ever felt watched while alone in a room with the door closed?',
      options: ['Never', 'Once', 'A few times', 'Regularly'] },
    { id: 'q9', section: 2, sectionTitle: 'Preferences', type: 'single',
      prompt: 'After locking a door, how often do you check it again?',
      options: ['Never', 'Once', 'Twice', 'More than twice'] },
    { id: 'q10', section: 2, sectionTitle: 'Preferences', type: 'single',
      prompt: 'Do you dream in color?',
      options: ['Yes', 'No', "I don't remember my dreams", "Only in red"] },

    // ---------------- Section 3 ----------------
    { id: 'q11', section: 3, sectionTitle: 'Perceptual Baseline', type: 'single',
      prompt: 'As a child, did you ever count the moon and arrive at a number other than one?',
      options: ['No, never', 'Once, and I dismissed it', 'More than once', "I don't recall counting"],
      flags: { progressGlitch: 'stutter' } },
    { id: 'q12', section: 3, sectionTitle: 'Perceptual Baseline', type: 'single',
      prompt: 'Think of your childhood bedroom. Was there a wall without a door or a window that you avoided?',
      options: ['No such wall existed', "Yes, but I don't know why I avoided it", "I've never thought about it until now", "I'd rather not answer"],
      flags: { overwrite: true, progressGlitch: 'jump' } },
    { id: 'q13', section: 3, sectionTitle: 'Perceptual Baseline', type: 'single',
      prompt: 'Describe where you were on the day the sky was the wrong color.',
      options: ["Hiding under a table", "Looking directly at it", "I was not born yet", "It hasn't happened yet"],
      flags: { progressGlitch: 'mismatch' } },

    // ---------------- Section 4 ----------------
    { id: 'q14', section: 4, sectionTitle: 'Perceptual Baseline II', type: 'single',
      prompt: 'When the lights in a room flicker twice and settle, do you count the shadows before the count is right again?',
      options: ["I've never noticed shadows behaving that way", 'Yes, quietly', 'I try not to', "I don't understand the question"],
      flags: { overwrite: true } },
    { id: 'q15', section: 4, sectionTitle: 'Perceptual Baseline II', type: 'single',
      prompt: "In your kindergarten class photograph, who is the person standing behind you that isn't listed on the roster?",
      options: ["My imaginary friend", "A dark shadow", "The smiling man", "Me, somehow"],
      flags: { researcherNote: 'SUBJECT RECALLS THE FIGURE.\nLOG TIMESTAMP.', progressGlitch: 'stutter' } },
    { id: 'q16', section: 4, sectionTitle: 'Perceptual Baseline II', type: 'single',
      prompt: 'How many corners does the room you are currently in have?',
      options: ['3', '4', '5', "Too many to count"],
      flags: { overwrite: true, progressGlitch: 'jump' } },

    // ---------------- Section 5 ----------------
    { id: 'q17', section: 5, sectionTitle: 'Follow-Up', type: 'single',
      prompt: "Thank you for your patience. Regarding the number you gave us for the room's corners — are you certain?",
      options: ['Yes', 'No, I may have miscounted', "I didn't give a number", 'Ask me again later'] },
    { id: 'q18', section: 5, sectionTitle: 'Follow-Up', type: 'single',
      prompt: 'We appreciate you telling us about {name}.',
      options: ["I didn't say that", "You're welcome", "Who are you?", "Stop it"],
      flags: { titleHijack: true, researcherNote: 'PHASE 2 INITIATED.\nSUBJECT RESPONSE CONSISTENT\nWITH PRIOR COHORT.' } },
    { id: 'q19', section: 5, sectionTitle: 'Follow-Up', type: 'single',
      prompt: 'Is there anyone else in the room with you right now?',
      options: ['No', 'Yes', "I'm not sure anymore"] },

    // ---------------- Section 6 ----------------
    { id: 'q20', section: 6, sectionTitle: 'Personalized Assessment', type: 'single',
      prompt: '{name}, when did you first suspect that this was not an ordinary survey?',
      options: ["The very first question", "Just now", "I've been here before", "I am still asleep"] },
    { id: 'q21', section: 6, sectionTitle: 'Personalized Assessment', type: 'single',
      prompt: 'Do you remember the last time you closed your eyes for longer than a blink?',
      options: ['Yes', 'No', "I'm not sure", "I don't want to think about it"],
      flags: { overwrite: true } },
    { id: 'q22', section: 6, sectionTitle: 'Personalized Assessment', type: 'single',
      prompt: 'Describe the sound the room makes when you stop moving.',
      options: ["A low hum", "Heavy breathing", "Scratching inside the walls", "Absolute, deafening silence"],
      flags: { researcherNote: 'SUBJECT ENGAGEMENT NOMINAL.\nPROCEED TO PHASE 3.' } },

    // ---------------- Section 7 ----------------
    { id: 'q23', section: 7, sectionTitle: 'Final Phase', type: 'single',
      prompt: 'When was the last time you felt certain you were entirely alone?',
      options: ["Years ago", "Right now", "I am never alone", "When I close my eyes"] },
    { id: 'q24', section: 7, sectionTitle: 'Final Phase', type: 'single',
      prompt: 'Where were you before you opened this page?',
      options: ["I don't remember", "In my bed", "At work", "Waiting for the signal"] },
    { id: 'q25', section: 7, sectionTitle: 'Final Phase', type: 'single',
      prompt: 'Say your name out loud, {name}. What happened when you did?',
      options: ["Nothing at all", "Someone whispered it back", "The lights flickered", "I forgot how to speak"] },
    { id: 'q26', section: 7, sectionTitle: 'Final Phase', type: 'single',
      prompt: 'What is on the other side of the wall without a door?',
      options: ["Just dirt", "Another version of me", "Teeth", "An endless hallway"] },
    { id: 'q27', section: 7, sectionTitle: 'Final Phase', type: 'single',
      prompt: 'We are almost finished. Choose your final truth. It no longer needs to be real.',
      options: ["I accept my fate", "Let me out of here", "I will wake up soon", "There is no way out"] }
  ];

  const SECTION_DREAD = { 1: 0, 2: 1, 3: 3, 4: 5, 5: 7, 6: 8, 7: 10 };

  function fillName(str) {
    return str.replace('{name}', state.name);
  }

  /* =========================================================
     AUDIO ENGINE (Advanced Horror Synthesis)
  ========================================================= */
  let audioCtx, masterGain;
  let humOsc1, humOsc2, noiseNode, filterNode, lfoNode;
  
  function initAudio() {
    if (audioCtx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    audioCtx = new AC();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0;
    masterGain.connect(audioCtx.destination);
  }

  function startHorrorAudio() {
    if (!audioCtx) initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    // Fade in master volume
    masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
    masterGain.gain.linearRampToValueAtTime(0.8, audioCtx.currentTime + 3);

    // 1. Dissonant Beating Drones
    humOsc1 = audioCtx.createOscillator();
    humOsc2 = audioCtx.createOscillator();
    humOsc1.type = 'sine';
    humOsc2.type = 'sine';
    humOsc1.frequency.value = 45; // Low sub
    humOsc2.frequency.value = 47; // Beats at 2Hz
    
    let droneGain = audioCtx.createGain();
    droneGain.gain.value = 0.2;
    humOsc1.connect(droneGain);
    humOsc2.connect(droneGain);
    droneGain.connect(masterGain);
    
    humOsc1.start();
    humOsc2.start();

    // 2. Breathing White Noise
    const bufferSize = audioCtx.sampleRate * 2;
    const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const output = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) { output[i] = Math.random() * 2 - 1; }
    
    noiseNode = audioCtx.createBufferSource();
    noiseNode.buffer = noiseBuffer;
    noiseNode.loop = true;

    filterNode = audioCtx.createBiquadFilter();
    filterNode.type = 'lowpass';
    filterNode.frequency.value = 200; 

    // LFO to modulate filter (creating breath effect)
    lfoNode = audioCtx.createOscillator();
    lfoNode.type = 'sine';
    lfoNode.frequency.value = 0.15; // Slow breathing rate
    let lfoGain = audioCtx.createGain();
    lfoGain.gain.value = 600; // Sweep up to 800Hz
    
    lfoNode.connect(lfoGain);
    lfoGain.connect(filterNode.frequency);
    
    let breathGain = audioCtx.createGain();
    breathGain.gain.value = 0.05; // Quiet initially

    noiseNode.connect(filterNode);
    filterNode.connect(breathGain);
    breathGain.connect(masterGain);

    lfoNode.start();
    noiseNode.start();

    // Tie breath volume to dread dynamically in the glitch loop
    state.breathGainNode = breathGain; 
  }

  function stopHorrorAudio() {
    if (masterGain) {
      masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
      setTimeout(() => {
        try { humOsc1.stop(); humOsc2.stop(); noiseNode.stop(); lfoNode.stop(); } catch(e){}
      }, 1100);
    }
  }

  function playChime() {
    if (!state.soundOn || !audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 660 - (state.dread * 20); // Pitch drops as dread increases
    gain.gain.value = 0;
    osc.connect(gain);
    gain.connect(masterGain);
    
    const t = audioCtx.currentTime;
    gain.gain.linearRampToValueAtTime(0.08, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.9);
    osc.start(t);
    osc.stop(t + 0.95);
  }

  function playGlitchSound() {
    if (!state.soundOn || !audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(100 + Math.random()*400, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.3);
    
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
  }

  function toggleSound() {
    state.soundOn = !state.soundOn;
    const btn = document.getElementById('soundToggle');
    btn.textContent = state.soundOn ? 'sound: on' : 'sound: off';
    if (state.soundOn) { startHorrorAudio(); }
    else { stopHorrorAudio(); }
  }

  document.getElementById('soundToggle').addEventListener('click', toggleSound);

  /* =========================================================
     CUSTOMIZATION MENU
  ========================================================= */
  const settingsBtn = document.getElementById('settingsBtn');
  const settingsModal = document.getElementById('settingsModal');
  const closeSettingsBtn = document.getElementById('closeSettingsBtn');

  settingsBtn.addEventListener('click', () => {
    settingsModal.classList.add('active');
  });
  closeSettingsBtn.addEventListener('click', () => {
    settingsModal.classList.remove('active');
  });

  document.getElementById('themeSelect').addEventListener('change', (e) => {
    if(e.target.value === 'default') document.body.removeAttribute('data-theme');
    else document.body.setAttribute('data-theme', e.target.value);
  });

  document.getElementById('fontSelect').addEventListener('change', (e) => {
    const font = e.target.value === 'serif' ? 'var(--serif)' : 'var(--mono)';
    document.documentElement.style.setProperty('--current-font', font);
  });

  document.getElementById('scanlineSelect').addEventListener('change', (e) => {
    document.documentElement.style.setProperty('--scanline-opacity', e.target.value);
  });

  document.getElementById('globalMotionToggle').addEventListener('change', (e) => {
    state.reducedMotion = e.target.checked;
    if(state.reducedMotion) document.getElementById('watcher-container').style.display = 'none';
    else document.getElementById('watcher-container').style.display = 'block';
  });

  /* =========================================================
     GRAPHICS & EYE TRACKING
  ========================================================= */
  const pupil = document.getElementById('watcher-pupil');
  document.addEventListener('mousemove', (e) => {
    if (state.reducedMotion || state.dread < 3) return;
    const x = (e.clientX / window.innerWidth) * 100;
    const y = (e.clientY / window.innerHeight) * 100;
    // Map cursor position to pupil movement within the SVG box (approx 30 to 70 range)
    const cx = 40 + (x * 0.2);
    const cy = 40 + (y * 0.2);
    pupil.setAttribute('cx', cx);
    pupil.setAttribute('cy', cy);
  });

  /* =========================================================
     DREAD-DRIVEN CSS VARS
  ========================================================= */
  function applyDread(level) {
    state.dread = level;
    document.documentElement.style.setProperty('--dread', level);
    
    // Escalate audio mix based on dread
    if(state.breathGainNode && audioCtx) {
       state.breathGainNode.gain.linearRampToValueAtTime(0.05 + (level * 0.02), audioCtx.currentTime + 2);
    }
    
    if(level >= 5 && lfoNode && audioCtx) {
       lfoNode.frequency.linearRampToValueAtTime(0.3 + (level*0.05), audioCtx.currentTime + 2); // faster breathing
    }
  }

  /* =========================================================
     MICRO-GLITCH LOOP
  ========================================================= */
  let glitchTimer = null;
  function scheduleGlitch() {
    if (state.reducedMotion) return;
    const base = 26000; // ~26s baseline
    const variance = 14000;
    const speedUp = Math.max(0.2, 1 - state.dread * 0.1);
    const delay = (base - state.dread * 1800 + (Math.random() * variance)) * speedUp;
    
    glitchTimer = setTimeout(() => {
      runRandomGlitch();
      scheduleGlitch();
    }, Math.max(2500, delay));
  }

  function runRandomGlitch() {
    if (state.screen !== 'survey') return;
    const promptEl = document.querySelector('.prompt');
    const roll = Math.random();
    
    if (roll < 0.45 && promptEl) {
      // Chromatic aberration flicker
      promptEl.setAttribute('data-text', promptEl.textContent);
      promptEl.classList.add('glitching');
      if (state.dread > 4) playGlitchSound();
      setTimeout(() => promptEl.classList.remove('glitching'), 90 + Math.random() * 80);
    } 
    else if (roll < 0.75 && state.dread >= 2) {
      // Scanline pulse
      const sl = document.getElementById('scanlines');
      sl.classList.add('glitch');
      setTimeout(() => sl.classList.remove('glitch'), 800 + Math.random() * 500);
    } 
    else if (state.dread >= 4 && promptEl) {
      // One-frame text substitution
      const original = promptEl.textContent;
      const decoys = ['IT IS STILL WAITING', 'DO NOT LOOK AWAY', 'THEY ARE BEHIND YOU', original];
      promptEl.textContent = decoys[Math.floor(Math.random() * 3)];
      playGlitchSound();
      requestAnimationFrame(() => {
        setTimeout(() => { promptEl.textContent = original; }, 60);
      });
    }
  }

  /* =========================================================
     RESEARCHER NOTE POPUP
  ========================================================= */
  function showResearcherNote(text) {
    if (state.reducedMotion) return; // Hide jump scare boxes if motion reduced
    const note = document.createElement('div');
    const corner = Math.random() < 0.5 ? 'top-right' : 'bottom-left';
    note.className = 'researcher-note ' + corner;
    note.style.whiteSpace = 'pre-line';
    note.textContent = text;
    document.body.appendChild(note);
    playGlitchSound();
    setTimeout(() => {
      if (note.parentNode) note.parentNode.removeChild(note);
    }, 1500);
  }

  /* =========================================================
     PROGRESS BAR
  ========================================================= */
  function renderProgress(container) {
    const wrap = document.createElement('div');
    wrap.className = 'progress-wrap';
    const track = document.createElement('div');
    track.className = 'progress-track';
    const fill = document.createElement('div');
    fill.className = 'progress-fill';
    fill.id = 'progressFill';
    track.appendChild(fill);
    const label = document.createElement('div');
    label.className = 'progress-label';
    label.innerHTML = '<span id="progressPct"></span><span>' + (state.qIndex >= 21 ? 'PHASE 3' : 'INTAKE') + '</span>';
    wrap.appendChild(track);
    wrap.appendChild(label);
    container.appendChild(wrap);
    updateProgress();
  }

  function updateProgress() {
    const fill = document.getElementById('progressFill');
    const pct = document.getElementById('progressPct');
    if (!fill || !pct) return;
    const total = QUESTIONS.length;
    let realPct = Math.round(((state.qIndex) / total) * 100);
    const q = QUESTIONS[state.qIndex];
    const glitch = q && q.flags && q.flags.progressGlitch;

    if (q && q.section === 7) {
      // section 7: bar exceeds 100%
      realPct = 100 + (state.qIndex - 22) * 8;
      fill.style.width = Math.min(realPct, 150) + '%';
      pct.textContent = realPct + '%';
      return;
    }

    if (glitch === 'stutter') {
      fill.style.width = Math.max(realPct - 9, 2) + '%';
      pct.textContent = realPct + '%';
      setTimeout(() => { fill.style.width = realPct + '%'; }, 650);
    } else if (glitch === 'jump') {
      fill.style.width = Math.min(realPct + 14, 100) + '%';
      pct.textContent = realPct + '%';
      setTimeout(() => { fill.style.width = realPct + '%'; }, 750);
    } else if (glitch === 'mismatch') {
      fill.style.width = realPct + '%';
      pct.textContent = Math.max(realPct - 22, 1) + '%'; 
    } else {
      fill.style.width = realPct + '%';
      pct.textContent = realPct + '%';
    }
  }

  /* =========================================================
     SPINNER
  ========================================================= */
  function withTransitionSpinner(cardEl, cb) {
    const spinner = document.createElement('div');
    spinner.className = 'spinner-inline active';
    spinner.innerHTML = 'loading <span class="spinner-dots"><span>.</span><span>.</span><span>.</span></span>';
    cardEl.appendChild(spinner);
    const base = 380;
    const lingerChance = state.reducedMotion ? 0 : Math.min(state.dread / 10, 0.5);
    const willLinger = Math.random() < lingerChance;
    const duration = willLinger ? base * (3 + Math.random() * 2) : base;
    setTimeout(() => {
      if (spinner.parentNode) spinner.parentNode.removeChild(spinner);
      cb();
    }, duration);
  }

  /* =========================================================
     RENDERING
  ========================================================= */
  const app = document.getElementById('app');

  function clearApp() {
    app.innerHTML = '';
  }

  function renderConsent() {
    clearApp();
    const card = document.createElement('div');
    card.className = 'consent-card';
    card.innerHTML = `
      <h1>Department of Cognitive &amp; Perceptual Studies</h1>
      <div class="protocol-line">Meridian Institute · Protocol No. MI-77-&#920; · Intake Survey, Rev. 4</div>
      <p>Thank you for agreeing to participate in this short intake survey. It will take approximately eight minutes to complete. Your responses help us calibrate baseline perceptual data across participants.</p>
      <div class="content-note-box">CONTENT NOTE: This is an interactive horror experience. Adjust visual & audio settings via the gear icon below. Please enable sound for the full experience.</div>
      <div class="btn-row" style="justify-content:flex-start;">
        <button class="btn" id="beginBtn">Acknowledge & Begin</button>
      </div>
    `;
    app.appendChild(card);
    document.getElementById('globalMotionToggle').checked = state.reducedMotion;
    
    document.getElementById('beginBtn').addEventListener('click', () => {
      state.screen = 'survey';
      state.qIndex = 0;
      applyDread(0);
      scheduleGlitch();
      renderSurveyShell();
      
      // Auto-start audio if allowed, otherwise rely on toggle
      if(state.soundOn) startHorrorAudio();
    });
  }

  function renderMasthead(container) {
    const m = document.createElement('div');
    m.className = 'masthead';
    m.innerHTML = `
      <div class="dept">Department of Cognitive &amp; Perceptual Studies</div>
      <div class="title">Intake Survey</div>
      <div class="protocol">Protocol No. MI-77-&#920; · Meridian Institute · Confidential</div>
    `;
    container.appendChild(m);
  }

  function renderSurveyShell() {
    clearApp();
    renderMasthead(app);
    renderProgress(app);
    const card = document.createElement('div');
    card.className = 'card entering';
    card.id = 'card';
    app.appendChild(card);
    renderQuestion(card);
    requestAnimationFrame(() => {
      card.classList.remove('entering');
      card.classList.add('visible');
    });
  }

  function renderQuestion(cardEl) {
    const q = QUESTIONS[state.qIndex];
    if (!q) { runEnding(); return; }

    if (q.section > 4 && q.flags && q.flags.titleHijack) {
      document.title = state.name;
      const fav = document.getElementById('favicon');
      fav.href = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%23000'/%3E%3C/svg%3E";
    }

    const dreadForSection = SECTION_DREAD[q.section] !== undefined ? SECTION_DREAD[q.section] : state.dread;
    applyDread(dreadForSection);

    cardEl.innerHTML = '';

    const tag = document.createElement('div');
    tag.className = 'section-tag';
    tag.textContent = 'Section ' + q.section + ' — ' + q.sectionTitle;
    cardEl.appendChild(tag);

    const promptEl = document.createElement('div');
    promptEl.className = 'prompt';
    const promptText = fillName(q.prompt);
    promptEl.textContent = promptText;
    cardEl.appendChild(promptEl);

    const errorEl = document.createElement('div');
    errorEl.className = 'error-msg';
    cardEl.appendChild(errorEl);

    let selectedValue = null;

    if (q.type === 'single') {
      const optWrap = document.createElement('div');
      optWrap.className = 'options';
      const readback = document.createElement('div');
      readback.className = 'readback';
      
      q.options.forEach((opt) => {
        const o = document.createElement('div');
        o.className = 'option';
        o.innerHTML = '<span class="dot"></span><span>' + opt + '</span>';
        
        o.addEventListener('click', () => {
          if (q.flags && q.flags.falseValidation && !state.usedFalseValidation) {
            state.usedFalseValidation = true;
            errorEl.textContent = 'Please select a valid response.';
            playGlitchSound();
            setTimeout(() => { errorEl.textContent = ''; }, 950);
            return; // block selection on fake validation
          }
          [...optWrap.querySelectorAll('.option')].forEach(el => el.classList.remove('selected'));
          o.classList.add('selected');
          selectedValue = opt;
          readback.textContent = 'Your answer: ' + opt;
          updateContinueEnabled(true);

          if (q.flags && q.flags.overwrite) {
            const alt = q.options.find(x => x !== opt) || opt;
            setTimeout(() => {
              if (selectedValue === opt) {
                readback.textContent = 'Your answer: ' + alt;
                [...optWrap.querySelectorAll('.option')].forEach(el => {
                  el.classList.toggle('selected', el.textContent.trim() === alt);
                });
                selectedValue = alt;
                playGlitchSound();
              }
            }, 1000 + Math.random() * 600);
          }
        });
        optWrap.appendChild(o);
      });
      cardEl.appendChild(optWrap);
      cardEl.appendChild(readback);
      
      addContinueRow(cardEl, q, () => selectedValue !== null, () => selectedValue);
    }
  }

  function addContinueRow(cardEl, q, isValidFn, getValueFn) {
    const row = document.createElement('div');
    row.className = 'btn-row';
    const spinnerHolder = document.createElement('div');
    row.appendChild(spinnerHolder);
    const btn = document.createElement('button');
    btn.className = 'btn';
    btn.textContent = 'Continue';
    btn.disabled = true;
    btn.id = 'continueBtn';
    row.appendChild(btn);
    cardEl.appendChild(row);

    btn.addEventListener('click', () => {
      const val = getValueFn();
      state.answers[q.id] = val;
      
      // Update global name based on Q1
      if(q.id === 'q1') { state.name = val; }
      
      playChime();
      btn.disabled = true;
      withTransitionSpinner(cardEl, () => {
        advance(cardEl, q);
      });
    });

    window._updateContinueEnabled = (v) => { btn.disabled = !v; };
  }

  function updateContinueEnabled(v) {
    if (window._updateContinueEnabled) window._updateContinueEnabled(v);
  }

  function advance(cardEl, q) {
    if (q.flags && q.flags.researcherNote) {
      showResearcherNote(q.flags.researcherNote);
    }
    cardEl.classList.remove('visible');
    cardEl.classList.add('leaving');
    setTimeout(() => {
      state.qIndex += 1;
      updateProgress();
      cardEl.classList.remove('leaving');
      cardEl.classList.add('entering');
      renderQuestion(cardEl);
      requestAnimationFrame(() => {
        cardEl.classList.remove('entering');
        cardEl.classList.add('visible');
      });
    }, 480);
  }

  /* =========================================================
     ENDING SEQUENCE
  ========================================================= */
  function runEnding() {
    state.screen = 'ending';
    if (glitchTimer) clearTimeout(glitchTimer);
    document.title = state.name;

    clearApp();
    document.getElementById('watcher-container').style.opacity = '0.3';
    
    const overlay = document.createElement('div');
    overlay.className = 'ending-overlay';
    overlay.innerHTML = '<div class="ending-text">Your responses have confirmed conscious awareness.<br><br>Please remain indoors until further notice.</div>';
    document.body.appendChild(overlay);
    
    // Ramp up the audio noise
    if(state.breathGainNode && audioCtx) {
        state.breathGainNode.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 3);
        lfoNode.frequency.linearRampToValueAtTime(2, audioCtx.currentTime + 3);
    }

    setTimeout(() => {
      const black = document.createElement('div');
      black.className = 'fade-to-black';
      const closed = document.createElement('div');
      closed.className = 'closed-text';
      closed.textContent = 'This tab was closed.';
      black.appendChild(closed);
      document.body.appendChild(black);
      
      requestAnimationFrame(() => {
        black.classList.add('active');
        setTimeout(() => {
          closed.classList.add('show');
          stopHorrorAudio(); // End audio
          try { window.close(); } catch (e) {}
        }, 2600);
      });
    }, 3200);
  }

  /* =========================================================
     INIT
  ========================================================= */
  renderConsent();
})();
</script>
</body>
</html>
